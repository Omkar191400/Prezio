backend:
  name: github
  repo: Omkar191400/Prezio
  branch: main

media_folder: assets/blog-images
public_folder: /assets/blog-images

collections:
  - name: blog
    label: Blog Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Author, name: author, widget: string, default: Prezio Team }
      - { label: Category, name: category, widget: select, options: ["Industry Insights", "Product Updates", "Telecom Trends", "Case Studies", "Company News"] }
      - { label: Summary, name: summary, widget: text, hint: "Short description shown on the blog listing page" }
      - { label: Cover Image, name: cover_image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
      - { label: Featured, name: featured, widget: boolean, default: false }
